name: CI

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
    tags:
      - "v*"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Check out the actual branch so the auto-format commit can be pushed.
          # For pull_request events this checks out the PR head branch.
          ref: ${{ github.head_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Format
        run: gofmt -w .

      - name: Commit formatting fixes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: auto-format Go code"
            git push
          else
            echo "No formatting changes needed."
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Run unit tests
        # Excludes TestAcc* acceptance tests — those require a live API
        run: go test ./... -run "^Test[^A]|^TestA[^c]|^TestAc[^c]" -v -count=1 -timeout
          5m

  acceptance-test:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # needed to remove the trigger label after the run
    # Run on pushes to main, or when a maintainer adds the 'acceptance-tests' label to a PR.
    if: >
      github.event_name == 'push' || (github.event_name == 'pull_request' &&
       github.event.action == 'labeled' &&
       github.event.label.name == 'acceptance-tests')
    steps:
      - name: Verify label was added by a maintainer
        # Prevent PR authors or contributors from self-triggering acceptance tests.
        # Only users with write, maintain, or admin permission on the repo may trigger.
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PERMISSION=$(gh api \
            repos/${{ github.repository }}/collaborators/${{ github.event.sender.login }}/permission \
            --jq '.permission')
          echo "Label added by ${{ github.event.sender.login }} with permission: $PERMISSION"
          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "maintain" && "$PERMISSION" != "write" ]]; then
            echo "::error::Only maintainers (write/maintain/admin) may trigger acceptance tests. Removing label."
            gh pr edit ${{ github.event.pull_request.number }} --remove-label "acceptance-tests" || true
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.7"
          terraform_wrapper: false

      - name: Run acceptance tests
        env:
          TF_ACC: "1"
          HUDDLE_API_KEY: ${{ secrets.HUDDLE_API_KEY }}
          HUDDLE_REGION: ${{ secrets.HUDDLE_REGION }}
          HUDDLE_BASE_URL: ${{ secrets.HUDDLE_BASE_URL }}
          HUDDLE_SSH_PUBLIC_KEY: ${{ secrets.HUDDLE_SSH_PUBLIC_KEY }}
          HUDDLE_FLAVOR_NAME: ${{ secrets.HUDDLE_FLAVOR_NAME }}
          HUDDLE_IMAGE_NAME: ${{ secrets.HUDDLE_IMAGE_NAME }}
        run: |
          export TF_ACC_TERRAFORM_PATH="$(which terraform)"
          go test ./... -run TestAcc -v -timeout 30m

      - name: Remove trigger label
        # Always remove the label after the run (pass or fail) so the maintainer
        # can re-trigger by adding it again without needing to remove it manually.
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --remove-label "acceptance-tests" || true

version: 2

project_name: terraform-provider-cloud

before:
  hooks:
    - go mod tidy

builds:
  - id: terraform-provider-cloud
    main: ./main.go
    binary: terraform-provider-cloud
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: ["zip"]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: huddle01
    name: terraform-provider-cloud
